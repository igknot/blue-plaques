version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: blue_plaques
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/blue_plaques
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-key-change-in-production
      ADMIN_EMAIL: admin@test.com
      ADMIN_PASSWORD: admin123
      ENVIRONMENT: development
      DEBUG: "True"
      # R2 credentials (optional for local testing)
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-dummy}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-dummy}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-dummy}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-blue-plaques-images}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-http://localhost:8000/images}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./static/images:/app/static/images
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:
