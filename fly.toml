app = "blue-plaques"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "8080"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[mounts]]
  source = "blue_plaques_data"
  destination = "/data"
